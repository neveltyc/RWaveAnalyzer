name: Bench

# Performance baseline against the committed bench/stress.fst.xz. Runs:
#   - after the Release workflow finishes for a `v*` tag, then appends a
#     results table to that release's body
#   - on manual workflow_dispatch (uploads results as a workflow artifact only)
#
# Why `workflow_run` instead of `push: tags`: bench and release used to trigger
# on the same tag push and then wrote the *same* GitHub release concurrently
# (release.yml's softprops create vs. bench's `gh release edit`). That race
# could detach the release from its tag, leaving an `untagged-<sha>` release
# that isn't marked latest (it hit v0.1.0). Triggering bench only after Release
# completes makes the release body a single-writer sequence — softprops fully
# publishes first, then bench appends.
#
# The dataset is checked in (bench/stress.fst.xz), so this workflow only needs
# cargo + python3 + xz + gnu-time — all preinstalled on ubuntu-latest runners.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: write   # so the post-release job can `gh release edit`

env:
  CARGO_TERM_COLOR: always
  # The ref we act on. For a release run, workflow_run.head_branch is the tag
  # name of the upstream (tag-triggered) Release run; for a manual dispatch it
  # is null, so we fall back to the dispatch ref.
  REF_NAME: ${{ github.event.workflow_run.head_branch || github.ref_name }}

jobs:
  bench:
    name: Performance baseline (ubuntu-latest)
    runs-on: ubuntu-latest
    # Release runs: only proceed if Release succeeded and it was a v* tag.
    # Manual dispatch always runs (artifact-only; it never edits a release).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - uses: actions/checkout@v4
        with:
          # Bench the exact commit the release was cut from (the tag's commit);
          # for a manual dispatch this is null and falls back to the default ref.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-bench-

      - name: Build rwave (release)
        run: cargo build --release

      - name: Run benchmark
        run: |
          mkdir -p bench/build
          python3 bench/run.py | tee bench/build/bench-output.md

      - name: Upload JSON + Markdown as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ env.REF_NAME }}
          path: |
            bench/build/results.json
            bench/build/bench-output.md
          retention-days: 90

      - name: Append results to the release notes (release runs only)
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${REF_NAME}"

          # Release has already completed (this job runs on its completion), so
          # the release exists and softprops is done writing it. A short retry
          # only absorbs GitHub API replication lag — no 15-minute poll, and no
          # concurrent writer to race with.
          found=0
          current=""
          for attempt in $(seq 1 6); do
            if current=$(gh release view "$tag" --json body --jq '.body' 2>/dev/null); then
              echo "release $tag is live after $attempt attempt(s)"
              found=1
              break
            fi
            echo "release $tag not visible yet; sleeping 10s ..."
            sleep 10
          done
          if [ "$found" -ne 1 ]; then
            echo "release $tag never appeared after the Release workflow completed; bailing out" >&2
            exit 1
          fi

          # Strip the "# rwave bench results" header and the trailing
          # "_JSON dump: ..._" line from the bench output; keep the
          # metadata bullets + table.
          trimmed=$(awk '
            /^# rwave bench results/ { next }
            /^_JSON dump/            { next }
            { print }
          ' bench/build/bench-output.md)

          {
            printf '%s\n\n' "$current"
            printf -- '---\n\n'
            printf '### Performance baseline (ubuntu-latest, single run)\n'
            printf '%s\n' "$trimmed"
          } > /tmp/release-body.md

          gh release edit "$tag" --notes-file /tmp/release-body.md
